<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>플레이리스트</title>
<!-- OG Tags for sharing -->
<meta property="og:type" content="music.playlist">
<meta property="og:title" id="og-title" content="플레이리스트">
<meta property="og:description" id="og-desc" content="나만의 플레이리스트를 감상하세요">
<meta property="og:image" id="og-image" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="tw-title" content="플레이리스트">
<meta name="twitter:description" content="나만의 플레이리스트를 감상하세요">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #8B5CF6;
    --accent-light: #A78BFA;
    --accent-dark: #6D28D9;
    --bg: #0A0A0F;
    --bg2: #111118;
    --bg3: #1A1A24;
    --bg4: #22222F;
    --surface: #1E1E2A;
    --surface2: #252535;
    --text: #F0F0F8;
    --text2: #A0A0B8;
    --text3: #606078;
    --border: rgba(139,92,246,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
  }
  .nav-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg3); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-back:active { transform: scale(0.9); }
  .nav-back svg { fill: var(--text); width: 20px; height: 20px; }
  .nav-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-share {
    padding: 7px 14px; font-size: 13px; font-weight: 600;
    border-radius: 8px; border: none; cursor: pointer;
    background: var(--accent); color: #fff;
    font-family: 'Pretendard', sans-serif; transition: all 0.2s;
  }
  .nav-share:active { transform: scale(0.96); background: var(--accent-dark); }

  main { padding-top: 56px; min-height: 100vh; padding-bottom: 40px; }

  /* HERO */
  .player-hero {
    position: relative; overflow: hidden;
    height: 400px;
    background: var(--bg2);
  }
  .hero-bg {
    position: absolute; inset: -20px;
    background-size: cover; background-position: center;
    filter: blur(30px) brightness(0.4) saturate(1.3);
    transform: scale(1.1);
    transition: all 0.5s ease;
  }
  .hero-cover-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -65%);
    width: 160px; height: 160px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    background: var(--bg3);
    transition: all 0.4s ease;
  }
  .hero-cover-frame img { width: 100%; height: 100%; object-fit: cover; }
  .hero-cover-default {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--accent-dark) 0%, #1a0533 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .hero-cover-default svg { fill: rgba(255,255,255,0.25); width: 60px; height: 60px; }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(10,10,15,0) 0%, rgba(10,10,15,0.4) 50%, rgba(10,10,15,1) 100%);
  }
  .hero-content {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 20px 20px;
  }
  .lyrics-overlay { margin-bottom: 14px; max-height: 72px; overflow: hidden; }
  .lyrics-overlay p {
    font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.8);
    font-weight: 400; text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .track-info { margin-bottom: 14px; }
  .track-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
  .track-artist { font-size: 14px; color: var(--text2); margin-top: 3px; font-weight: 500; }

  /* PLAYER CONTROLS */
  .player-controls {
    display: flex; align-items: center; justify-content: space-between;
  }
  .ctrl-left { display: flex; align-items: center; gap: 16px; }
  .play-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(139,92,246,0.4);
    transition: all 0.2s; flex-shrink: 0;
    text-decoration: none;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn svg { fill: #fff; width: 22px; height: 22px; }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
  .ctrl-btn svg { fill: rgba(255,255,255,0.7); width: 18px; height: 18px; }
  .yt-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    font-size: 12px; font-weight: 600; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.15); transition: all 0.2s;
  }
  .yt-badge:active { background: rgba(255,255,255,0.2); }

  /* PROGRESS BAR (visual only) */
  .progress-bar-wrap {
    margin-top: 14px;
    height: 3px; background: rgba(255,255,255,0.15);
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 30%;
    background: linear-gradient(to right, var(--accent), var(--accent-light));
    border-radius: 2px;
    animation: progress-pulse 4s ease-in-out infinite alternate;
  }
  @keyframes progress-pulse { 0%{width:5%} 100%{width:85%} }

  /* PLAYLIST */
  .playlist-section { padding: 16px 0 20px; }
  .playlist-header {
    padding: 0 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .playlist-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .track-count { font-size: 13px; color: var(--text3); font-weight: 500; }
  .track-list { padding: 0 12px; display: flex; flex-direction: column; gap: 2px; }
  .track-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .track-item:active { background: var(--surface); }
  .track-item.active { background: var(--surface); }
  .track-thumb {
    width: 48px; height: 48px; border-radius: 8px;
    background: var(--bg4); flex-shrink: 0; overflow: hidden; position: relative;
  }
  .track-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .track-thumb-default {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--accent-dark), #1a0533);
    display: flex; align-items: center; justify-content: center;
  }
  .track-thumb-default svg { fill: rgba(255,255,255,0.3); width: 20px; height: 20px; }
  .track-playing-indicator {
    position: absolute; inset: 0;
    background: rgba(139,92,246,0.3);
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .bars { display: flex; gap: 2px; align-items: flex-end; height: 16px; }
  .bar { width: 3px; background: var(--accent-light); border-radius: 2px; animation: eq 0.8s ease-in-out infinite alternate; }
  .bar:nth-child(1){animation-delay:0s} .bar:nth-child(2){animation-delay:0.2s} .bar:nth-child(3){animation-delay:0.1s}
  @keyframes eq { 0%{height:4px} 100%{height:14px} }
  .track-meta { flex: 1; min-width: 0; }
  .track-meta-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta-artist { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .track-item.active .track-meta-title { color: var(--accent-light); }
  .track-num { font-size: 13px; color: var(--text3); font-weight: 500; min-width: 20px; text-align: center; }

  /* LYRICS PANEL */
  .lyrics-panel {
    margin: 12px 16px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1px solid var(--border);
    display: none;
  }
  .lyrics-panel.show { display: block; }
  .lyrics-panel-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .lyrics-panel p { font-size: 15px; line-height: 1.9; color: var(--text2); white-space: pre-wrap; }

  /* ERROR STATE */
  .error-state {
    padding: 80px 30px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .error-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
  .error-icon svg { fill: var(--text3); width: 32px; height: 32px; }
  .error-title { font-size: 20px; font-weight: 800; }
  .error-desc { font-size: 14px; color: var(--text3); line-height: 1.6; }

  /* SHARE BTN */
  .share-float {
    position: fixed; bottom: 20px; right: 16px; z-index: 50;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(139,92,246,0.5);
    transition: all 0.2s;
  }
  .share-float:active { transform: scale(0.92); }
  .share-float svg { fill: #fff; width: 22px; height: 22px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: 24px; z-index: 300;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid var(--border);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* VINYL ANIMATION on cover */
  .vinyl-spin {
    animation: vinyl 8s linear infinite;
    animation-play-state: paused;
  }
  .vinyl-spin.playing { animation-play-state: running; }
  @keyframes vinyl { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* FOOTER */
  .footer { padding: 20px; text-align: center; }
  .footer a { color: var(--text3); font-size: 12px; text-decoration: none; font-weight: 500; }
  .footer a:hover { color: var(--accent-light); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <button class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </button>
  <div class="nav-title" id="nav-title">플레이리스트</div>
  <button class="nav-share" onclick="handleShare()">공유</button>
</nav>

<main id="main-content">
  <!-- Content rendered by JS -->
</main>

<!-- FLOAT SHARE BTN -->
<button class="share-float" onclick="handleShare()">
  <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let playlist = null;
let currentIdx = 0;

function init() {
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get('data');

  if (dataParam) {
    try {
      playlist = JSON.parse(decodeURIComponent(dataParam));
    } catch(e) {
      renderError('링크가 올바르지 않습니다. 데이터를 확인해주세요.');
      return;
    }
  } else {
    renderError('공유 데이터가 없습니다. 에디터에서 링크를 생성해주세요.');
    return;
  }

  if (!playlist || !playlist.tracks) {
    renderError('플레이리스트 데이터를 불러올 수 없습니다.');
    return;
  }

  // Apply accent color
  if (playlist.accentColor) applyAccent(playlist.accentColor);

  // Update og tags dynamically (for cached pages)
  const title = playlist.name || '플레이리스트';
  document.title = title + ' — PLEditor';
  document.getElementById('nav-title').textContent = title;

  renderPage();
}

function applyAccent(hex) {
  const r = document.documentElement;
  r.style.setProperty('--accent', hex);
  r.style.setProperty('--accent-light', lightenHex(hex, 20));
  r.style.setProperty('--accent-dark', darkenHex(hex, 15));
}

function renderPage() {
  const t = playlist.tracks[currentIdx];
  const main = document.getElementById('main-content');

  const coverSrc = t && (t.coverImageUrl || t.coverImage);
  const coverContent = coverSrc
    ? `<img src="${coverSrc}" alt="앨범 커버" class="vinyl-spin">` // no auto-play
    : `<div class="hero-cover-default"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>`;

  const bgStyle = coverSrc ? `style="background-image:url('${coverSrc}')"` : '';

  const ytUrl = t && t.youtubeUrl ? t.youtubeUrl : '';

  const trackListHtml = playlist.tracks.map((tr, i) => {
    const cs = tr.coverImageUrl || tr.coverImage;
    return `
    <div class="track-item ${i===currentIdx?'active':''}" onclick="selectTrack(${i})">
      <div class="track-thumb">
        ${cs ? `<img src="${cs}" alt="">` : `<div class="track-thumb-default"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>`}
        ${i===currentIdx ? `<div class="track-playing-indicator"><div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>` : ''}
      </div>
      <div class="track-meta">
        <div class="track-meta-title">${esc(tr.title)}</div>
        <div class="track-meta-artist">${esc(tr.artist)}</div>
      </div>
      <div class="track-num">${i+1}</div>
    </div>
  `}).join('');

  main.innerHTML = `
    <div class="player-hero">
      <div class="hero-bg" ${bgStyle}></div>
      <div class="hero-cover-frame">${coverContent}</div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        ${t && t.lyrics ? `<div class="lyrics-overlay"><p>${esc(t.lyrics.split('\n').slice(0,3).join('\n'))}</p></div>` : ''}
        <div class="track-info">
          <div class="track-title">${t ? esc(t.title) : '트랙 없음'}</div>
          <div class="track-artist">${t ? esc(t.artist) : ''}</div>
        </div>
        <div class="player-controls">
          <div class="ctrl-left">
            <button class="ctrl-btn" onclick="prevTrack()">
              <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            ${ytUrl
              ? `<a class="play-btn" href="${ytUrl}" target="_blank" rel="noopener">
                  <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </a>`
              : `<button class="play-btn" onclick="showToast('YouTube URL이 없는 곡입니다')">
                  <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>`
            }
            <button class="ctrl-btn" onclick="nextTrack()">
              <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.89L8 13.86V9.86zM16 6h2v12h-2z"/></svg>
            </button>
          </div>
          ${ytUrl ? `<a class="yt-badge" href="${ytUrl}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" style="fill:currentColor;width:14px;height:14px;"><path d="M21.593 7.203a2.506 2.506 0 0 0-1.762-1.766C18.265 5.007 12 5 12 5s-6.264-.007-7.831.404a2.56 2.56 0 0 0-1.766 1.778c-.413 1.566-.417 4.814-.417 4.814s-.004 3.264.406 4.814c.23.857.905 1.534 1.763 1.765 1.582.43 7.83.437 7.83.437s6.265.007 7.831-.403a2.515 2.515 0 0 0 1.767-1.763c.414-1.565.417-4.812.417-4.812s.02-3.265-.407-4.831zM9.996 15.005l.005-6 5.207 3.005-5.212 2.995z"/></svg>
            YouTube에서 듣기
          </a>` : ''}
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      </div>
    </div>

    <div class="playlist-section">
      <div class="playlist-header">
        <div class="playlist-name">${esc(playlist.name)}</div>
        <div class="track-count">${playlist.tracks.length}곡</div>
      </div>
      <div class="track-list">${trackListHtml}</div>
    </div>

    ${t && t.lyrics ? `
    <div class="lyrics-panel show">
      <div class="lyrics-panel-title">가사</div>
      <p>${esc(t.lyrics)}</p>
    </div>` : ''}

    <!--<div class="footer">
      <a href="index.html">PLEditor로 나만의 플레이리스트 만들기 →</a>
    </div>-->
  `;
}

function selectTrack(idx) {
  currentIdx = idx;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevTrack() {
  if (!playlist.tracks.length) return;
  currentIdx = (currentIdx - 1 + playlist.tracks.length) % playlist.tracks.length;
  renderPage();
}
function nextTrack() {
  if (!playlist.tracks.length) return;
  currentIdx = (currentIdx + 1) % playlist.tracks.length;
  renderPage();
}

function renderError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <div class="error-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
      <div class="error-title">플레이리스트를 불러올 수 없어요</div>
      <div class="error-desc">${msg}</div>
    </div>`;
}

async function handleShare() {
  const url = window.location.href;
  try {
    if (navigator.share) {
      await navigator.share({
        title: (playlist?.name || '플레이리스트') + ' — PLEditor',
        text: '나만의 플레이리스트를 들어보세요!',
        url: url
      });
    } else {
      await navigator.clipboard.writeText(url);
      showToast('링크가 복사되었습니다!');
    }
  } catch(e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('링크가 복사되었습니다!');
    } catch(e2) {
      showToast('공유에 실패했습니다');
    }
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function lightenHex(hex, a) {
  const [r,g,b]=hexToRgb(hex);
  return rgbToHex(Math.min(255,r+a*1.5),Math.min(255,g+a*1.5),Math.min(255,b+a*1.5));
}
function darkenHex(hex, a) {
  const [r,g,b]=hexToRgb(hex);
  return rgbToHex(Math.max(0,r-a),Math.max(0,g-a),Math.max(0,b-a));
}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');}

init();
